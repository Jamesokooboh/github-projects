name: Test Workflow

##specify
on:
  push:
    branches: 
        - main
  workflow_dispatch:

jobs:
  
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: create a file on the runner
        uses: actions/checkout@v4
      - name: install terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.14.6 